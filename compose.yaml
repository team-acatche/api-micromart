services:
  taxcalculatorapi:
    image: taxcalculatorapi
    ports:
      - "60997:8080"
    build:
      context: .
      dockerfile: TaxCalculatorApi/Dockerfile
    networks:
      - network-micromart

  invoicenumbergeneratorapi:
    image: invoicenumbergeneratorapi
    ports:
      - "60998:8080"
    build:
      context: .
      dockerfile: InvoiceNumberGeneratorApi/Dockerfile
    networks:
      - network-micromart

  discountengineapi:
    image: discountengineapi
    ports:
      - "60999:8080"
    build:
      context: .
      dockerfile: DiscountEngineApi/Dockerfile
    networks:
      - network-micromart

  registryservice:
    image: registryservice
    ports:
      - "61000:8080"
    environment:
    - TAX_CALCULATOR_URI=http://taxcalculatorapi:8080
    - INVOICE_NUMBER_GENERATOR_URI=http://invoicenumbergeneratorapi:8080
    - DISCOUNT_ENGINE_URI=http://discountengineapi:8080
    build:
      context: .
      dockerfile: RegistryService/Dockerfile
    depends_on:
      - discountengineapi
      - invoicenumbergeneratorapi
      - taxcalculatorapi
    networks:
      - network-micromart

  micromart:
    image: micromart
    ports:
      - "61001:8080"
    environment:
      - REGISTRY_URI=http://registryservice:8080
    build:
      context: .
      dockerfile: AcatcheApiMicromart/Dockerfile
    depends_on:
      - registryservice
    networks:
      - network-micromart

networks:
  network-micromart:
    driver: bridge

